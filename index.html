<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin:0;
  height:100%;
  overflow:hidden;
}

.widget {
  display:flex;
  flex-direction:column;
  gap:10px;
  height:100%;
  padding:10px;
}

/* GIF */
.gif-box {
  flex:1;
  position:relative;
  overflow:hidden;
  border-radius:20px;
}

.gif-box img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
}

/* 텍스트 */
.dt-overlay {
  position:absolute;
  bottom:16px;
  left:18px;
  color:white;

  text-shadow:
    0 2px 4px rgba(0,0,0,0.9),
    0 0 12px rgba(0,0,0,0.7),
    0 0 24px rgba(0,0,0,0.4);
}

/* 폰트 조절 */
.font-control {
  opacity:0;
}
.dt-overlay:hover .font-control {
  opacity:1;
}

/* 컨트롤 */
.ctrl-box {
  background:linear-gradient(160deg,#6CC4BC,#4BA8A0);
  border-radius:20px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.btn-row {
  display:flex;
  gap:15px;
}

.btn {
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.7);
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.15s;
}

.btn:hover {
  transform:scale(1.12);
  background:rgba(255,255,255,0.12);
}

.btn svg {
  width:18px;
  height:18px;
  fill:white;
}
</style>
</head>

<body>

<div class="widget">

  <!-- GIF -->
  <div class="gif-box">
    <img id="gif">

    <div class="dt-overlay">
      <div id="datetime"></div>

      <div class="font-control">
        <button onclick="changeFont(1)">+</button>
        <button onclick="changeFont(-1)">-</button>
      </div>
    </div>
  </div>

  <!-- 컨트롤 -->
  <div class="ctrl-box">
    <div class="btn-row">

      <!-- 정지 -->
      <button class="btn" onclick="stopMusic()">
        <svg viewBox="0 0 24 24">
          <rect x="6" y="5" width="4" height="14"/>
          <rect x="14" y="5" width="4" height="14"/>
        </svg>
      </button>

      <!-- 재생 -->
      <button class="btn" onclick="playMusic()">
        <svg viewBox="0 0 24 24">
          <polygon points="6,4 20,12 6,20"/>
        </svg>
      </button>

      <!-- 셔플 -->
      <button class="btn" onclick="shuffleGIF()">
        <svg viewBox="0 0 24 24">
          <path d="M16 3h5v5h-2V6.41l-4.29 4.3-1.42-1.42 4.3-4.29H16V3zM4 7h3l4 5-4 5H4v-2h2.5l3-3.5-3-3.5H4V7zm16 10v-2h-1.59l-4.3-4.29 1.42-1.42 4.29 4.3V11h2v6h-5z"/>
        </svg>
      </button>

      <!-- 비 -->
      <button class="btn" onclick="rainMusic()">
        <svg viewBox="0 0 24 24">
          <path d="M6 14a4 4 0 1 1 1-7 5 5 0 0 1 10 1h1a3 3 0 0 1 0 6H6zm2 2l-1 3m5-3l-1 3m5-3l-1 3"/>
        </svg>
      </button>

    </div>
  </div>

</div>

<!-- 🔥 오디오 -->
<audio id="bgm" loop></audio>

<script>

/* =========================
   GIF
========================= */
const gifs = ["gif1.gif","gif2.gif","gif3.gif"];
const gif = document.getElementById("gif");

function shuffleGIF(){
  const pick = gifs[Math.floor(Math.random()*gifs.length)];
  gif.src = pick;
}
shuffleGIF();

/* =========================
   시간
========================= */
function updateTime(){
  const now = new Date();
  datetime.innerText =
    now.getFullYear()+"년 "+(now.getMonth()+1)+"월 "+now.getDate()+"일\n"+
    now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

/* =========================
   폰트 저장
========================= */
let fontSize = localStorage.getItem("fontSize") || 14;

function changeFont(d){
  fontSize = Math.max(10, Math.min(30, parseInt(fontSize)+d));
  datetime.style.fontSize = fontSize+"px";
  localStorage.setItem("fontSize", fontSize);
}
datetime.style.fontSize = fontSize+"px";

/* =========================
   🎵 음악 (핵심)
========================= */
const bgm = document.getElementById("bgm");

/* ▶ 1번 */
function playMusic(){
  if (!bgm.src.includes("1.mp3")) {
    bgm.src = "1.mp3";
  }
  bgm.play();
}

/* 🌧 2번 */
function rainMusic(){
  if (!bgm.src.includes("2.mp3")) {
    bgm.src = "2.mp3";
  }
  bgm.play();
}

/* ⏸ 정지 */
function stopMusic(){
  bgm.pause();
}

</script>

</body>
</html>
