<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GIF Widget</title>
<style>
  @font-face {
    font-family: 'A2Z';
    src: local('A2Z 4'), local('A2Z 4 Regular'), local('Freesentation-4Regular');
    font-weight: 400;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'A2Z', 'Segoe UI', sans-serif;
  }

  .widget {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: transparent;
  }

  /* ── GIF Box ── */
  .gif-box {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
    border-radius: 18px;
    background: #000;
  }

  .gif-box img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── DateTime Overlay ── */
  .dt-overlay {
    position: absolute;
    bottom: 16px; left: 18px;
    color: #fff;
    font-size: clamp(11px, 2.2vw, 15px);
    line-height: 1.55;
    text-shadow: 0 1px 5px rgba(0,0,0,0.65), 0 0 16px rgba(0,0,0,0.25);
    pointer-events: none;
    z-index: 2;
    letter-spacing: 0.3px;
  }

  /* ── Controls Box ── */
  .ctrl-box {
    flex-shrink: 0;
    border-radius: 18px;
    background: linear-gradient(160deg, #6CC4BC 0%, #55B3AB 40%, #4BA8A0 100%);
    padding: 14px 24px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    background: transparent;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.75);
  }
  .btn:active { transform: scale(0.92); }
  .btn.active {
    background: rgba(255,255,255,0.2);
    border-color: #fff;
  }
  .btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* ── Progress ── */
  .progress-row {
    width: 100%;
  }

  .track {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.22);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
  }

  .fill {
    height: 100%;
    background: rgba(255,255,255,0.85);
    border-radius: 3px;
    width: 0%;
    position: relative;
    transition: width 0.25s linear;
  }

  .thumb {
    position: absolute;
    right: -8px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 6px rgba(0,0,0,0.25);
  }

  /* ── Hidden iframes ── */
  .hidden {
    position: absolute;
    width: 0; height: 0;
    overflow: hidden;
    pointer-events: none;
  }
</style>
</head>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
(function(){
  /* ── DateTime ── */
  var dtEl = document.getElementById('dt');
  var days = ['\uc77c\uc694\uc77c','\uc6d4\uc694\uc77c','\ud654\uc694\uc77c','\uc218\uc694\uc77c','\ubaa9\uc694\uc77c','\uae08\uc694\uc77c','\ud1a0\uc694\uc77c'];
  function tick(){
    var n = new Date();
    var h = n.getHours(), ap = h < 12 ? '\uc624\uc804' : '\uc624\ud6c4';
    if(h > 12) h -= 12; if(h === 0) h = 12;
    dtEl.innerHTML = n.getFullYear()+'\ub144 '+(n.getMonth()+1)+'\uc6d4 '+n.getDate()+'\uc77c '+days[n.getDay()]
      +'<br>'+ap+' '+h+':'+String(n.getMinutes()).padStart(2,'0');
  }
  tick(); setInterval(tick, 1000);

  /* ── SoundCloud ── */
  var wM, wR, active = null;
  var fillEl = document.getElementById('fill');
  var trackEl = document.getElementById('track');

  function initSC(){
    try {
      wM = SC.Widget('scM');
      wR = SC.Widget('scR');
      wM.bind(SC.Widget.Events.PLAY_PROGRESS, function(e){ if(active==='m') updP(e.currentPosition, wM); });
      wR.bind(SC.Widget.Events.PLAY_PROGRESS, function(e){ if(active==='r') updP(e.currentPosition, wR); });
      wM.bind(SC.Widget.Events.FINISH, resetP);
      wR.bind(SC.Widget.Events.FINISH, resetP);
    } catch(e){}
  }

  function updP(pos, w){
    w.getDuration(function(d){ if(d>0) fillEl.style.width = (pos/d*100)+'%'; });
  }
  function resetP(){
    fillEl.style.width = '0%';
    active = null;
    document.getElementById('bPlay').classList.remove('active');
    document.getElementById('bRain').classList.remove('active');
  }

  if(typeof SC !== 'undefined') initSC();
  else window.addEventListener('load', function(){ setTimeout(initSC, 800); });

  trackEl.addEventListener('click', function(e){
    var w = active==='m' ? wM : active==='r' ? wR : null;
    if(!w) return;
    var pct = (e.clientX - trackEl.getBoundingClientRect().left) / trackEl.offsetWidth;
    w.getDuration(function(d){ w.seekTo(pct * d); });
  });

  /* ── Buttons ── */
  document.getElementById('bPause').onclick = function(){
    if(wM) wM.pause(); if(wR) wR.pause();
    document.getElementById('bPlay').classList.remove('active');
    document.getElementById('bRain').classList.remove('active');
    active = null;
  };
  document.getElementById('bPlay').onclick = function(){
    if(wR) wR.pause();
    document.getElementById('bRain').classList.remove('active');
    if(wM) wM.play();
    active = 'm'; this.classList.add('active');
  };
  document.getElementById('bRain').onclick = function(){
    if(wM) wM.pause();
    document.getElementById('bPlay').classList.remove('active');
    if(wR) wR.play();
    active = 'r'; this.classList.add('active');
  };
})();
</script>
